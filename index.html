<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dua After Salah</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, serif;
  background: #f7f5f0;
  color: #1a1a1a;
  padding-bottom: 3rem;
}

header {
  background: #1D9E75;
  color: white;
  text-align: center;
  padding: 1.4rem 1rem 1rem;
}
header h1 {
  font-size: 1.35rem;
  letter-spacing: 0.04em;
  font-weight: normal;
}
header p {
  font-size: 0.78rem;
  opacity: 0.8;
  margin-top: 4px;
  font-family: sans-serif;
  letter-spacing: 0.06em;
}

.reset-all-bar {
  display: flex;
  justify-content: flex-end;
  padding: 0.75rem 1rem;
}
.btn-reset-all {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.2);
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 0.78rem;
  color: #666;
  cursor: pointer;
  font-family: sans-serif;
  letter-spacing: 0.05em;
}
.btn-reset-all:active { background: #e8e4dc; }

.card {
  background: #fff;
  margin: 0 0.75rem 0.85rem;
  border-radius: 14px;
  border: 1px solid rgba(0,0,0,0.08);
  overflow: hidden;
}

.card-header {
  background: #f0ede6;
  padding: 0.65rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.card-num {
  font-size: 0.7rem;
  font-family: sans-serif;
  color: #888;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.card-target {
  font-size: 0.7rem;
  font-family: sans-serif;
  color: #1D9E75;
  font-weight: bold;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.card-note {
  font-size: 0.65rem;
  font-family: sans-serif;
  color: #e07b30;
  letter-spacing: 0.05em;
  margin-top: 1px;
  text-align: right;
}

.card-body {
  padding: 1rem 1rem 0.85rem;
}

.arabic {
  font-size: 1.55rem;
  line-height: 2;
  text-align: right;
  direction: rtl;
  color: #1a1a1a;
  margin-bottom: 0.6rem;
  font-family: 'Traditional Arabic', 'Scheherazade New', Georgia, serif;
}

.transliteration {
  font-size: 0.82rem;
  font-family: sans-serif;
  color: #555;
  line-height: 1.6;
  margin-bottom: 0.5rem;
  font-style: italic;
}

.translation {
  font-size: 0.8rem;
  font-family: sans-serif;
  color: #777;
  line-height: 1.5;
  margin-bottom: 0.9rem;
  border-left: 2px solid #1D9E75;
  padding-left: 0.6rem;
}

.counter-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-top: 0.5rem;
}

.btn-count {
  flex: 1;
  padding: 0.8rem 0;
  border-radius: 10px;
  border: none;
  background: #1D9E75;
  color: white;
  font-size: 0.9rem;
  font-family: sans-serif;
  letter-spacing: 0.05em;
  cursor: pointer;
  box-shadow: 0 4px 0 #0F6E56;
  transition: transform 0.07s, box-shadow 0.07s;
  -webkit-tap-highlight-color: transparent;
}
.btn-count:active {
  transform: translateY(3px);
  box-shadow: 0 1px 0 #0F6E56;
}
.btn-count.done {
  background: #085041;
  box-shadow: 0 4px 0 #04342C;
}

.count-display {
  min-width: 52px;
  text-align: center;
  font-size: 1.9rem;
  font-weight: 500;
  color: #1a1a1a;
  line-height: 1;
  transition: transform 0.08s;
}
.count-display.pop { transform: scale(1.2); }
.count-display.done-num { color: #1D9E75; }

.btn-reset-one {
  background: transparent;
  border: 1px solid rgba(0,0,0,0.18);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.75rem;
  color: #888;
  cursor: pointer;
  font-family: sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.btn-reset-one:active { background: #f0ede6; }

.progress-bar-wrap {
  height: 3px;
  background: #e8e4dc;
  border-radius: 99px;
  margin-top: 0.6rem;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: #1D9E75;
  border-radius: 99px;
  transition: width 0.2s;
}

.done-badge {
  display: none;
  font-size: 0.7rem;
  font-family: sans-serif;
  color: #1D9E75;
  text-align: center;
  margin-top: 0.4rem;
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<header>
  <h1>Dua After Fard Salah</h1>
  <p>13 RECOMMENDED DUAS</p>
</header>

<div class="reset-all-bar">
  <button class="btn-reset-all" onclick="resetAll()">Reset All</button>
</div>

<div id="cards"></div>

<script>
const duas = [
  {
    num: 1,
    title: "Takbir",
    target: 1,
    note: "",
    arabic: "ٱللَّهُ أَكْبَرُ",
    transliteration: "Allahu Akbar",
    translation: "Allah is the greatest."
  },
  {
    num: 2,
    title: "Istighfar",
    target: 3,
    note: "",
    arabic: "أَسْتَغْفِرُ ٱللَّهَ\nأَسْتَغْفِرُ ٱللَّهَ\nأَسْتَغْفِرُ ٱللَّهَ",
    transliteration: "Astaghfirullah (×3)",
    translation: "I ask Allah to forgive me."
  },
  {
    num: 3,
    title: "As-Salam",
    target: 1,
    note: "",
    arabic: "اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ",
    transliteration: "Allahumma antas'salam; Wa-minkas salam; Taba'rakhta ya dhal'jalaali wal-ikram.",
    translation: "O Allah! You are peace and from You comes peace. Blessed are You, O owner of Majesty and Honour."
  },
  {
    num: 4,
    title: "Dhikr & Shukr",
    target: 1,
    note: "",
    arabic: "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ",
    transliteration: "Allahumma aa'inni ala dhik-rika; Wa-shuk'rika; Wa-husni ibadatik.",
    translation: "O Allah, assist me in remembering You, in thanking You, and worshipping You in the best of manners."
  },
  {
    num: 5,
    title: "Tahlil",
    target: 1,
    note: "",
    arabic: "لَا إِلَهَ إِلَّا ٱللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",
    transliteration: "Laa ilaha illal-lah; Wah dahu laa-sharee kalah; Lahul mulku wa-lahul hamd; Wa-huwa ala kulee shay'in qadeer.",
    translation: "None has the right to be worshipped except Allah, alone, without partner. To Him belongs all sovereignty and praise, and He is over all things omnipotent."
  },
  {
    num: 6,
    title: "Tasbeeh (×100)",
    target: 100,
    note: "",
    arabic: "سُبْحَانَ ٱللَّهِ\nٱلْحَمْدُ لِلَّهِ\nٱللَّهُ أَكْبَرُ",
    transliteration: "Subhan Allah · Alhamdulillah · Allahu Akbar (×33 each = 99)\nThen: Laa ilaha illal-lah wahdahu laa sharee kalah...",
    translation: "Glorious is Allah. Praises are due to Allah. Allah is the greatest."
  },
  {
    num: 7,
    title: "After Fajr & Maghrib only",
    target: 10,
    note: "Fajr & Maghrib only",
    arabic: "لَا إِلَهَ إِلَّا ٱللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ يُحْيِي وَيُمِيتُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",
    transliteration: "La-ilaha illal-lah; Wah dahu laa-sharee kalah; Lahul mulku wa-lahul hamd; Yuh'ee wa-yumeet; Wa-huwa ala kuli shay'in qadeer.",
    translation: "None has the right to be worshipped except Allah, alone, without partner. To Him belongs all sovereignty and praise. He gives life and causes death and He is over all things omnipotent."
  },
  {
    num: 8,
    title: "Jannah & Protection",
    target: 7,
    note: "Fajr & Maghrib only",
    arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ رِضَاكَ وَالْجَنَّةَ وَأَعُوذُ بِكَ مِنْ سَخَطِكَ وَالنَّارِ",
    transliteration: "Allahumma inni as-aluka ridaaka wal jannah; Wa-a'udhu bika min sakha'tika wan'naar.",
    translation: "O Allah! I ask You to be pleased with me, reward me with Paradise, and I seek Your refuge from Your anger and the punishment of the Fire."
  },
  {
    num: 9,
    title: "Ayatul Kursi",
    target: 1,
    note: "",
    arabic: "ٱللَّهُ لَآ إِلَـٰهَ إِلَّا هُوَ ٱلْحَىُّ ٱلْقَيُّومُ ۚ لَا تَأْخُذُهُۥ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُۥ مَا فِى ٱلسَّمَـٰوَٰتِ وَمَا فِى ٱلْأَرْضِ",
    transliteration: "Allahu la-ilaaha illaa'hu wal haiyul qai-yoom; Laa-ta'khudhuhoo sinatu'oo walaa na'woom; Lahoo ma-fis'samaawaati wama fil ard... (2:255)",
    translation: "Allah – there is no deity except Him, the Ever-Living, the Sustainer of all existence. Neither drowsiness overtakes Him nor sleep. To Him belongs whatever is in the heavens and whatever is on the earth… (Al-Baqarah 2:255)"
  },
  {
    num: 10,
    title: "Surah Al-Ikhlas",
    target: 3,
    note: "3× after Fajr & Maghrib",
    arabic: "قُلْ هُوَ ٱللَّهُ أَحَدٌ ٱللَّهُ ٱلصَّمَدُ لَمْ يَلِدْ وَلَمْ يُولَدْ وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌ",
    transliteration: "Qul hu'wallaa-hu ahad. Allah hus-samad. Lam yalid wa-lam yoou'lad. Wa-lam'ya kul-lahu kufu'wan ahad.",
    translation: "Say: He is Allah, [who is] One. Allah, the Eternal Refuge. He neither begets nor is born. Nor is there to Him any equivalent. (112:1–4)"
  },
  {
    num: 11,
    title: "Surah Al-Falaq",
    target: 3,
    note: "3× after Fajr & Maghrib",
    arabic: "قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ مِن شَرِّ مَا خَلَقَ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ وَمِن شَرِّ ٱلنَّفَّـٰثَـٰتِ فِى ٱلْعُقَدِ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ",
    transliteration: "Qul a'udhubi rabbil falaq. Min sharri ma khalaq. Wa-min sharri gha'siqin idha waqab. Wa-min shar'rin naf'faa thaati'fil uqad. Wa-min shar'ri haa'sidin idha hasad.",
    translation: "Say: I seek refuge in the Lord of daybreak, from the evil of that which He created, and from the evil of darkness when it settles, and from the evil of the blowers in knots, and from the evil of an envier when he envies. (113:1–5)"
  },
  {
    num: 12,
    title: "Surah An-Nas",
    target: 3,
    note: "3× after Fajr & Maghrib",
    arabic: "قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ مَلِكِ ٱلنَّاسِ إِلَـٰهِ ٱلنَّاسِ مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ",
    transliteration: "Qul a'udhubi rab'binn naas. Malik'inn naas. Ilaa hin'naas. Min shar'ril was-wasil khan'naas. Alladhee yu'was wi'su fee sudoo rin'naas. Minal jin'nati wan naas.",
    translation: "Say: I seek refuge in the Lord of mankind, the Sovereign of mankind, the God of mankind, from the evil of the retreating whisperer — who whispers [evil] into the breasts of mankind — from among the jinn and mankind. (114:1–6)"
  },
  {
    num: 13,
    title: "Durood Ibrahim",
    target: 1,
    note: "",
    arabic: "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ إِنَّكَ حَمِيدٌ مَجِيدٌ",
    transliteration: "Allaahumma salli 'ala Muhammad; Wa-ala aali Muhammad; Kama sal'layta ala-Ibraaheem; Wa-ala aali Ibraaheem; Innaka hamee dum-majeed.",
    translation: "O Allah, let Your blessings come upon Muhammad and the family of Muhammad, as You have blessed Ibrahim and his family. Truly, You are Praiseworthy and Glorious."
  }
];

const counts = new Array(duas.length).fill(0);

function pop(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 120);
}

function updateCard(i) {
  const c = counts[i];
  const target = duas[i].target;
  const pct = Math.min(c / target * 100, 100);
  const done = c >= target;

  document.getElementById('count-' + i).textContent = c;
  document.getElementById('count-' + i).className = 'count-display' + (done ? ' done-num' : '');
  document.getElementById('bar-' + i).style.width = pct + '%';
  document.getElementById('btn-' + i).textContent = done ? '✓ Done' : 'Count';
  document.getElementById('btn-' + i).className = 'btn-count' + (done ? ' done' : '');
  document.getElementById('done-' + i).style.display = done ? 'block' : 'none';
}

function increment(i) {
  counts[i]++;
  pop(document.getElementById('count-' + i));
  updateCard(i);
}

function resetOne(i) {
  counts[i] = 0;
  updateCard(i);
}

function resetAll() {
  for (let i = 0; i < duas.length; i++) { counts[i] = 0; updateCard(i); }
}

const container = document.getElementById('cards');

duas.forEach((d, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  const targetLabel = d.target === 1 ? 'RECITE ONCE' : 'RECITE ×' + d.target;
  card.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-num">DUA ${d.num} · ${d.title}</div>
        ${d.note ? `<div class="card-note">${d.note}</div>` : ''}
      </div>
      <div class="card-target">${targetLabel}</div>
    </div>
    <div class="card-body">
      <div class="arabic">${d.arabic.replace(/\n/g, '<br>')}</div>
      <div class="transliteration">${d.transliteration.replace(/\n/g, '<br>')}</div>
      <div class="translation">${d.translation}</div>
      <div class="counter-row">
        <button class="btn-count" id="btn-${i}" onclick="increment(${i})">Count</button>
        <div class="count-display" id="count-${i}">0</div>
        <button class="btn-reset-one" onclick="resetOne(${i})">↺</button>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="bar-${i}" style="width:0%"></div>
      </div>
      <div class="done-badge" id="done-${i}">✓ COMPLETED</div>
    </div>
  `;
  container.appendChild(card);
});
</script>
</body>
</html>
